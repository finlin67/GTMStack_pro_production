<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GTM Stack Data Sync Mesh</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react?deps=react@18.2.0",
        "framer-motion": "https://esm.sh/framer-motion?deps=react@18.2.0"
      }
    }
    </script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#5a5cf2",
              "background-light": "#f6f6f8",
              "background-dark": "#0f111a",
              "glass-dark": "rgba(255, 255, 255, 0.03)",
              "glass-border": "rgba(255, 255, 255, 0.1)",
            },
            fontFamily: {
              "display": ["Inter", "sans-serif"],
              "mono": ["JetBrains Mono", "monospace"]
            },
            borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
          },
        },
      }
    </script>
    <style type="text/tailwindcss">
      @layer utilities {
        .glass-card {
          background: rgba(255, 255, 255, 0.03);
          backdrop-filter: blur(12px);
          border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .warehouse-hub {
          background: radial-gradient(circle at center, #5a5cf2 0%, #111118 100%);
          box-shadow: 0 0 40px rgba(90, 92, 242, 0.3);
        }
        .custom-scrollbar::-webkit-scrollbar {
          width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
          background: rgba(255, 255, 255, 0.02);
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
          background: rgba(255, 255, 255, 0.1);
          border-radius: 10px;
        }
      }
      body {
        background-color: #0f111a;
        margin: 0;
        padding: 0;
      }
    </style>
</head>
<body class="bg-background-dark font-display text-slate-100 min-h-screen flex items-center justify-center">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { motion, AnimatePresence } from 'framer-motion';
        import { 
          Network, 
          ArrowRightLeft, 
          ScrollText, 
          Settings, 
          Search, 
          HelpCircle, 
          LayoutGrid, 
          Download, 
          ShieldCheck, 
          GitFork, 
          Zap, 
          Filter, 
          Database, 
          Megaphone, 
          CreditCard, 
          BrainCircuit, 
          Terminal, 
          CloudCog,
          History,
          Bell,
          AlertTriangle,
          ChevronRight,
          Clock
        } from 'lucide-react';

        // --- Sub-components ---

        function Sidebar({ 
          activeView, 
          setView, 
          alertCount 
        }) {
          return (
            <div className="w-14 bg-[#161822] border-r border-white/10 flex flex-col items-center py-4 gap-4 z-20 shrink-0">
              <div className="size-8 rounded-lg bg-indigo-500/20 text-indigo-400 flex items-center justify-center mb-2">
                <CloudCog size={20} />
              </div>
              
              <button 
                onClick={() => setView('dashboard')}
                className={`p-2 rounded-lg transition-all duration-200 ${activeView === 'dashboard' ? 'bg-white/10 text-white shadow-[0_0_15px_rgba(255,255,255,0.1)]' : 'text-slate-500 hover:text-slate-300 hover:bg-white/5'}`}
              >
                <LayoutGrid size={20} />
              </button>
              
              <button 
                onClick={() => setView('logs')}
                className={`p-2 rounded-lg transition-all duration-200 ${activeView === 'logs' ? 'bg-white/10 text-white shadow-[0_0_15px_rgba(255,255,255,0.1)]' : 'text-slate-500 hover:text-slate-300 hover:bg-white/5'}`}
              >
                <ScrollText size={20} />
              </button>

              <button 
                onClick={() => setView('alerts')}
                className={`p-2 rounded-lg transition-all duration-200 relative ${activeView === 'alerts' ? 'bg-white/10 text-white shadow-[0_0_15px_rgba(255,255,255,0.1)]' : 'text-slate-500 hover:text-slate-300 hover:bg-white/5'}`}
              >
                <Bell size={20} />
                {alertCount > 0 && (
                  <span className="absolute top-1 right-1 size-2 bg-rose-500 rounded-full border border-[#161822]" />
                )}
              </button>

              <div className="mt-auto flex flex-col gap-4">
                <div className="size-8 rounded-full bg-slate-800 flex items-center justify-center text-slate-400 hover:text-white cursor-pointer transition-colors">
                  <HelpCircle size={18} />
                </div>
              </div>
            </div>
          );
        }

        function DashboardHome({ 
          stats, 
          nodes, 
          hoveredNodeId, 
          setHoveredNodeId 
        }) {
          const activeNode = nodes.find(n => n.id === hoveredNodeId);

          const getTooltipPosition = (id) => {
            switch(id) {
              case 'salesforce': return { top: '3rem', left: '0.5rem' };
              case 'hubspot': return { bottom: '3rem', left: '0.5rem' };
              case 'stripe': return { top: '3rem', right: '0.5rem' };
              case 'ml': return { bottom: '3rem', right: '0.5rem' };
              case 'eventbus': return { top: '50%', left: '50%', transform: 'translate(-50%, 50%)', marginTop: '1.5rem' };
              default: return {};
            }
          };

          return (
            <div className="flex flex-col h-full overflow-hidden">
              <header className="h-14 border-b border-white/10 flex items-center justify-between px-4 bg-[#0f111a]/30 backdrop-blur-md z-10 shrink-0">
                <div className="flex items-center gap-4">
                  <h2 className="text-white text-sm font-bold tracking-tight">Sync Mesh</h2>
                  <div className="relative w-40 group hidden sm:block">
                    <Search className="absolute left-2.5 top-1/2 -translate-y-1/2 text-slate-500" size={14} />
                    <input 
                      className="w-full bg-white/5 border border-white/10 rounded-lg pl-8 pr-3 py-1.5 text-xs text-slate-300 focus:ring-1 focus:ring-[#5a5cf2] focus:border-[#5a5cf2] placeholder:text-slate-600 transition-all outline-none" 
                      placeholder="Search..." 
                      type="text" 
                    />
                  </div>
                </div>
                <div className="flex items-center gap-3">
                  <div className="flex items-center gap-1.5 px-2 py-1 bg-emerald-500/10 border border-emerald-500/20 rounded-full">
                    <motion.div 
                      className="size-1.5 bg-emerald-500 rounded-full"
                      animate={{ opacity: [1, 0.4, 1] }}
                      transition={{ duration: 2, repeat: Infinity }}
                    />
                    <span className="text-emerald-500 text-[10px] font-bold tracking-tight uppercase">Online</span>
                  </div>
                  <button className="text-slate-400 hover:text-white transition-colors">
                      <Settings size={16} />
                  </button>
                </div>
              </header>

              <div className="flex-1 p-4 flex flex-col gap-4 overflow-hidden">
                <div className="grid grid-cols-4 gap-3 flex-shrink-0">
                  <div className="p-3 rounded-xl bg-white/5 border border-white/10 backdrop-blur-sm hover:border-white/20 transition-all">
                    <div className="flex items-center justify-between mb-1">
                      <span className="text-slate-400 text-[10px] font-bold uppercase tracking-wider">Ingest</span>
                      <Download className="text-sky-400" size={14} />
                    </div>
                    <div className="flex items-baseline gap-1.5">
                      <h4 className="text-sm font-mono text-white font-bold tracking-tighter">{stats.ingest.toFixed(1)}M</h4>
                    </div>
                  </div>
                  <div className="p-3 rounded-xl bg-white/5 border border-white/10 backdrop-blur-sm hover:border-white/20 transition-all">
                    <div className="flex items-center justify-between mb-1">
                      <span className="text-slate-400 text-[10px] font-bold uppercase tracking-wider">Clean</span>
                      <ShieldCheck className="text-emerald-400" size={14} />
                    </div>
                    <div className="flex items-baseline gap-1.5">
                      <h4 className="text-sm font-mono text-white font-bold tracking-tighter">{stats.clean}%</h4>
                    </div>
                  </div>
                  <div className="p-3 rounded-xl bg-white/5 border border-white/10 backdrop-blur-sm hover:border-white/20 transition-all">
                    <div className="flex items-center justify-between mb-1">
                      <span className="text-slate-400 text-[10px] font-bold uppercase tracking-wider">Route</span>
                      <GitFork className="text-[#5a5cf2]" size={14} />
                    </div>
                    <div className="flex items-baseline gap-1.5">
                      <h4 className="text-sm font-mono text-white font-bold tracking-tighter">{stats.route}K</h4>
                    </div>
                  </div>
                  <div className="p-3 rounded-xl bg-white/5 border border-fuchsia-500/20 backdrop-blur-sm hover:border-fuchsia-500/40 transition-all">
                    <div className="flex items-center justify-between mb-1">
                      <span className="text-slate-400 text-[10px] font-bold uppercase tracking-wider">Signals</span>
                      <Zap className="text-fuchsia-400" size={14} />
                    </div>
                    <div className="flex items-baseline gap-1.5">
                      <h4 className="text-sm font-mono text-white font-bold tracking-tighter">{stats.signals}</h4>
                    </div>
                  </div>
                </div>

                <div className="flex flex-1 gap-4 overflow-hidden min-h-0">
                  <div className="flex-1 rounded-xl bg-white/5 border border-white/10 flex flex-col overflow-hidden min-w-0">
                    <div className="px-4 py-3 border-b border-white/10 flex items-center justify-between flex-shrink-0">
                      <h3 className="text-white text-xs font-bold uppercase tracking-wider">Pipelines</h3>
                      <Filter className="text-slate-500 cursor-pointer hover:text-white" size={14} />
                    </div>
                    <div className="flex-1 overflow-y-auto custom-scrollbar">
                      <table className="w-full text-left border-collapse">
                        <thead className="sticky top-0 bg-[#161822] z-10 border-b border-white/10">
                          <tr>
                            <th className="px-4 py-2 text-[9px] font-bold text-slate-500 uppercase tracking-widest">System</th>
                            <th className="px-4 py-2 text-[9px] font-bold text-slate-500 uppercase tracking-widest">Status</th>
                            <th className="px-4 py-2 text-[9px] font-bold text-slate-500 uppercase tracking-widest text-right">Lat</th>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-white/5">
                          <AnimatePresence>
                            {nodes.map((node) => (
                              <motion.tr 
                                key={node.id} 
                                className="hover:bg-white/5 transition-colors group cursor-pointer"
                                layout
                                initial={{ opacity: 0 }}
                                animate={{ opacity: 1 }}
                                onMouseEnter={() => setHoveredNodeId(node.id)}
                                onMouseLeave={() => setHoveredNodeId(null)}
                              >
                                <td className="px-4 py-2.5">
                                  <div className="flex items-center gap-2">
                                    <div className={`p-1 rounded ${node.bgClass} ${node.colorClass}`}>
                                      <node.icon size={12} />
                                    </div>
                                    <p className="text-xs font-medium text-white truncate max-w-[80px] sm:max-w-none">{node.name}</p>
                                  </div>
                                </td>
                                <td className="px-4 py-2.5">
                                    <div className="flex items-center gap-1.5">
                                      <div className={`size-1.5 rounded-full ${node.statusBgClass.replace('bg-', 'bg-') === node.bgClass ? node.colorClass.replace('text-', 'bg-') : 'bg-emerald-400'}`}></div>
                                      <span className="text-[9px] text-slate-400 font-mono hidden sm:inline">{node.status}</span>
                                    </div>
                                </td>
                                <td className="px-4 py-2.5 text-right">
                                  <span className="font-mono text-[10px] text-slate-300">{node.latency}ms</span>
                                </td>
                              </motion.tr>
                            ))}
                          </AnimatePresence>
                        </tbody>
                      </table>
                    </div>
                  </div>

                  <div className="w-[140px] sm:w-[180px] flex-shrink-0 flex flex-col gap-3">
                    <div className="flex-1 rounded-xl bg-white/5 border border-white/10 relative overflow-hidden flex flex-col items-center justify-center p-4">
                        <div className="absolute top-3 left-3 z-20">
                          <span className="text-[9px] text-emerald-500 font-mono bg-emerald-500/10 px-1.5 py-0.5 rounded">LIVE</span>
                        </div>

                        <AnimatePresence>
                          {activeNode && (
                            <motion.div 
                              initial={{ opacity: 0, scale: 0.9, y: 5 }}
                              animate={{ opacity: 1, scale: 1, y: 0 }}
                              exit={{ opacity: 0, scale: 0.9, y: 5 }}
                              transition={{ duration: 0.15 }}
                              style={getTooltipPosition(activeNode.id)}
                              className="absolute z-30 w-36 bg-[#0f111a]/95 backdrop-blur-md border border-white/20 shadow-2xl rounded-lg p-2.5 flex flex-col gap-2 pointer-events-none"
                            >
                                <div className="flex items-center gap-2 border-b border-white/10 pb-1.5">
                                  <div className={`p-1 rounded ${activeNode.bgClass} ${activeNode.colorClass}`}>
                                    <activeNode.icon size={10} />
                                  </div>
                                  <span className="text-[10px] font-bold text-white leading-none">{activeNode.name}</span>
                                </div>
                                <div className="grid grid-cols-2 gap-y-1 gap-x-2">
                                  <div className="flex flex-col">
                                    <span className="text-[8px] text-slate-500 uppercase font-bold">Latency</span>
                                    <span className="text-[9px] font-mono text-white">{activeNode.latency}ms</span>
                                  </div>
                                  <div className="flex flex-col">
                                    <span className="text-[8px] text-slate-500 uppercase font-bold">Status</span>
                                    <span className={`text-[9px] font-bold ${activeNode.statusColorClass}`}>{activeNode.status}</span>
                                  </div>
                                  <div className="col-span-2 flex flex-col mt-0.5">
                                    <span className="text-[8px] text-slate-500 uppercase font-bold">Throughput</span>
                                    <span className="text-[9px] font-mono text-white">{activeNode.records}</span>
                                  </div>
                                </div>
                            </motion.div>
                          )}
                        </AnimatePresence>

                        <div className="relative size-32 flex items-center justify-center scale-90 sm:scale-100">
                          <svg className="absolute inset-0 w-full h-full pointer-events-none">
                              <line x1="50%" y1="50%" x2="20%" y2="20%" stroke="rgba(255,255,255,0.1)" strokeWidth="1" strokeDasharray="2 2" />
                              <motion.circle r="1.5" fill="#38bdf8" animate={{ cx: ["20%", "50%"], cy: ["20%", "50%"], opacity: [0, 1, 0] }} transition={{ duration: 1.5, repeat: Infinity, delay: 0 }} />
                              <line x1="50%" y1="50%" x2="80%" y2="20%" stroke="rgba(255,255,255,0.1)" strokeWidth="1" strokeDasharray="2 2" />
                              <motion.circle r="1.5" fill="#e879f9" animate={{ cx: ["80%", "50%"], cy: ["20%", "50%"], opacity: [0, 1, 0] }} transition={{ duration: 1.8, repeat: Infinity, delay: 0.2 }} />
                              <line x1="50%" y1="50%" x2="20%" y2="80%" stroke="rgba(255,255,255,0.1)" strokeWidth="1" strokeDasharray="2 2" />
                              <motion.circle r="1.5" fill="#34d399" animate={{ cx: ["20%", "50%"], cy: ["80%", "50%"], opacity: [0, 1, 0] }} transition={{ duration: 1.2, repeat: Infinity, delay: 0.5 }} />
                              <line x1="50%" y1="50%" x2="80%" y2="80%" stroke="rgba(255,255,255,0.1)" strokeWidth="1" strokeDasharray="2 2" />
                              <motion.circle r="1.5" fill="#5a5cf2" animate={{ cx: ["50%", "80%"], cy: ["50%", "80%"], opacity: [0, 1, 0] }} transition={{ duration: 1.4, repeat: Infinity, delay: 0.8 }} />
                          </svg>

                          <motion.div 
                              className="size-16 rounded-full flex items-center justify-center relative z-10 cursor-pointer warehouse-hub"
                              animate={{ scale: [1, 1.05, 1] }}
                              transition={{ duration: 4, repeat: Infinity, repeatType: "mirror" }}
                              onMouseEnter={() => setHoveredNodeId('eventbus')}
                              onMouseLeave={() => setHoveredNodeId(null)}
                          >
                              <CloudCog size={24} className="text-white" />
                          </motion.div>

                          <motion.div 
                            className="absolute top-2 left-2 p-1.5 rounded bg-sky-500/10 text-sky-400 border border-sky-400/20 cursor-pointer z-20" 
                            animate={{y: [0,-3,0]}} 
                            transition={{duration:3, repeat:Infinity, repeatType: "mirror"}}
                            onMouseEnter={() => setHoveredNodeId('salesforce')}
                            onMouseLeave={() => setHoveredNodeId(null)}
                          >
                              <Database size={12} />
                          </motion.div>
                          <motion.div 
                            className="absolute bottom-2 left-2 p-1.5 rounded bg-emerald-500/10 text-emerald-400 border border-emerald-400/20 cursor-pointer z-20" 
                            animate={{y: [0,3,0]}} 
                            transition={{duration:3.5, repeat:Infinity, repeatType: "mirror"}}
                            onMouseEnter={() => setHoveredNodeId('hubspot')}
                            onMouseLeave={() => setHoveredNodeId(null)}
                          >
                              <Megaphone size={12} />
                          </motion.div>
                          <motion.div 
                            className="absolute top-2 right-2 p-1.5 rounded bg-fuchsia-500/10 text-fuchsia-400 border border-fuchsia-400/20 cursor-pointer z-20" 
                            animate={{y: [0,-2,0]}} 
                            transition={{duration:4, repeat:Infinity, repeatType: "mirror"}}
                            onMouseEnter={() => setHoveredNodeId('stripe')}
                            onMouseLeave={() => setHoveredNodeId(null)}
                          >
                              <CreditCard size={12} />
                          </motion.div>
                          <motion.div 
                            className="absolute bottom-2 right-2 p-1.5 rounded bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 cursor-pointer z-20" 
                            animate={{y: [0,4,0]}} 
                            transition={{duration:3.2, repeat:Infinity, repeatType: "mirror"}}
                            onMouseEnter={() => setHoveredNodeId('ml')}
                            onMouseLeave={() => setHoveredNodeId(null)}
                          >
                              <BrainCircuit size={12} />
                          </motion.div>
                        </div>
                        
                        <div className="w-full mt-4 space-y-2">
                            <div className="flex justify-between text-[9px] text-slate-500 font-bold uppercase">
                              <span>Load</span>
                              <span className="text-white">Hi-Eff</span>
                            </div>
                            <div className="h-1 w-full bg-slate-800 rounded-full overflow-hidden">
                              <motion.div 
                                className="bg-[#5a5cf2] h-full"
                                animate={{ width: `${Math.min(100, (stats.inflow / 6) * 100)}%` }}
                              />
                            </div>
                            <div className="flex justify-between text-[9px] font-mono">
                              <span className="text-slate-400">In: <span className="text-white">{stats.inflow}k</span></span>
                              <span className="text-slate-400">Out: <span className="text-white">{stats.outflow}k</span></span>
                            </div>
                        </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          );
        }

        function LogsView() {
          const [logs] = useState([
            { id: '1', timestamp: '10:42:01.240', level: 'INFO', event: 'Contact Sync', source: 'Salesforce', destination: 'Event Bus', latency: '120ms' },
            { id: '2', timestamp: '10:42:01.115', level: 'INFO', event: 'Deal Closed', source: 'HubSpot', destination: 'Analytics', latency: '45ms' },
            { id: '3', timestamp: '10:41:59.880', level: 'WARN', event: 'Rate Limit', source: 'Stripe API', destination: 'Gateway', latency: '820ms' },
            { id: '4', timestamp: '10:41:58.420', level: 'INFO', event: 'Webhook Recv', source: 'External', destination: 'Ingest', latency: '22ms' },
            { id: '5', timestamp: '10:41:55.102', level: 'ERROR', event: 'Schema Mismatch', source: 'Legacy DB', destination: 'Transformer', latency: '12ms' },
            { id: '6', timestamp: '10:41:54.005', level: 'INFO', event: 'Signal Processed', source: 'ML Core', destination: 'Scoring', latency: '240ms' },
            { id: '11', timestamp: '10:41:52.330', level: 'INFO', event: 'Batch Export', source: 'Warehouse', destination: 'S3', latency: '1.2s' },
          ]);

          return (
            <div className="flex flex-col h-full bg-[#0f111a] overflow-hidden">
              <header className="h-14 border-b border-white/10 flex items-center justify-between px-4 bg-[#0f111a]/30 backdrop-blur-md z-10 shrink-0">
                <div className="flex items-center gap-3">
                   <History className="text-slate-400" size={16} />
                   <h2 className="text-white text-sm font-bold tracking-tight">System Logs</h2>
                   <span className="px-2 py-0.5 rounded-full bg-slate-800 text-[10px] text-slate-400 font-mono uppercase">Live Tail</span>
                </div>
              </header>

              <div className="flex-1 overflow-auto custom-scrollbar p-4">
                 <div className="rounded-xl border border-white/10 bg-white/5 overflow-hidden">
                    <table className="w-full text-left border-collapse">
                       <thead className="bg-[#161822] text-xs font-bold text-slate-500 uppercase tracking-wider border-b border-white/10">
                         <tr>
                           <th className="px-4 py-3 w-32">Time</th>
                           <th className="px-4 py-3 w-20">Level</th>
                           <th className="px-4 py-3">Event</th>
                           <th className="px-4 py-3 text-right">Lat</th>
                         </tr>
                       </thead>
                       <tbody className="divide-y divide-white/5 text-xs">
                         {logs.map((log) => (
                           <tr key={log.id} className="hover:bg-white/5 transition-colors font-mono">
                             <td className="px-4 py-2.5 text-slate-400">{log.timestamp}</td>
                             <td className="px-4 py-2.5">
                               <span className={`px-1.5 py-0.5 rounded text-[10px] font-bold ${
                                 log.level === 'INFO' ? 'bg-sky-500/10 text-sky-400' :
                                 log.level === 'WARN' ? 'bg-amber-500/10 text-amber-400' :
                                 'bg-rose-500/10 text-rose-400'
                               }`}>
                                 {log.level}
                               </span>
                             </td>
                             <td className="px-4 py-2.5 text-slate-200 font-sans">{log.event}</td>
                             <td className="px-4 py-2.5 text-right text-slate-400">{log.latency}</td>
                           </tr>
                         ))}
                       </tbody>
                    </table>
                 </div>
              </div>
            </div>
          );
        }

        function AlertsView({ 
          alerts, 
          nodes, 
          thresholds, 
          onThresholdChange, 
          onResolve 
        }) {
          return (
            <div className="flex flex-col h-full bg-[#0f111a] overflow-hidden">
              <header className="h-14 border-b border-white/10 flex items-center justify-between px-4 bg-[#0f111a]/30 backdrop-blur-md z-10 shrink-0">
                <div className="flex items-center gap-3">
                   <Bell className="text-rose-400" size={16} />
                   <h2 className="text-white text-sm font-bold tracking-tight">Alert Center</h2>
                   <span className="px-2 py-0.5 rounded-full bg-rose-500/10 text-[10px] text-rose-400 font-bold uppercase tracking-wider">
                     {alerts.filter(a => !a.resolved).length} Active
                   </span>
                </div>
              </header>

              <div className="flex-1 overflow-y-auto custom-scrollbar p-4 flex flex-col gap-6">
                <section>
                  <h3 className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-3 flex items-center gap-2">
                    <AlertTriangle size={12} className="text-rose-500" /> Triggered Alerts
                  </h3>
                  <div className="flex flex-col gap-2">
                    <AnimatePresence mode="popLayout">
                      {alerts.filter(a => !a.resolved).length === 0 ? (
                        <motion.div 
                          key="healthy"
                          initial={{ opacity: 0 }} 
                          animate={{ opacity: 1 }} 
                          className="bg-white/5 border border-white/10 rounded-xl p-6 flex flex-col items-center justify-center text-center"
                        >
                          <ShieldCheck size={32} className="text-emerald-500/40 mb-2" />
                          <p className="text-xs text-slate-500 font-medium">System healthy. No active latency alerts.</p>
                        </motion.div>
                      ) : (
                        alerts.filter(a => !a.resolved).map(alert => (
                          <motion.div 
                            key={alert.id}
                            initial={{ opacity: 0, x: -10 }}
                            animate={{ opacity: 1, x: 0 }}
                            exit={{ opacity: 0, scale: 0.95 }}
                            className="bg-rose-500/5 border border-rose-500/20 rounded-xl p-3 flex items-center justify-between group"
                          >
                            <div className="flex items-center gap-3">
                              <div className="size-8 rounded-lg bg-rose-500/10 text-rose-500 flex items-center justify-center">
                                <AlertTriangle size={16} />
                              </div>
                              <div>
                                <div className="flex items-center gap-2">
                                  <p className="text-xs font-bold text-white">{alert.nodeName}</p>
                                  <span className="text-[10px] text-slate-500 font-mono">{alert.timestamp}</span>
                                </div>
                                <p className="text-[10px] text-rose-400 font-medium">
                                  Latency {alert.latency}ms exceeded threshold {alert.threshold}ms
                                </p>
                              </div>
                            </div>
                            <button 
                              onClick={() => onResolve(alert.id)}
                              className="text-[10px] font-bold text-slate-500 hover:text-white px-2 py-1 rounded-lg border border-white/10 hover:bg-white/10 transition-all sm:opacity-0 group-hover:opacity-100"
                            >
                              Acknowledge
                            </button>
                          </motion.div>
                        ))
                      )}
                    </AnimatePresence>
                  </div>
                </section>

                <section>
                  <h3 className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-3 flex items-center gap-2">
                    <Settings size={12} className="text-slate-400" /> Threshold Config
                  </h3>
                  <div className="grid grid-cols-1 gap-2">
                    {nodes.map(node => (
                      <div key={node.id} className="bg-white/5 border border-white/10 rounded-xl p-3 flex items-center justify-between">
                        <div className="flex items-center gap-3">
                          <div className={`p-1.5 rounded ${node.bgClass} ${node.colorClass}`}>
                            <node.icon size={14} />
                          </div>
                          <div>
                            <p className="text-xs font-bold text-white leading-none">{node.name}</p>
                            <span className="text-[9px] text-slate-500 font-mono italic">ID: {node.id}</span>
                          </div>
                        </div>
                        <div className="flex items-center gap-3">
                          <div className="flex flex-col items-end">
                            <span className="text-[9px] text-slate-500 font-bold uppercase tracking-tight">Latency Limit</span>
                            <div className="flex items-center gap-2">
                              <input 
                                type="range"
                                min="10"
                                max="500"
                                step="10"
                                value={thresholds[node.id] || 100}
                                onChange={(e) => onThresholdChange(node.id, parseInt(e.target.value))}
                                className="w-24 h-1 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-indigo-500"
                              />
                              <span className="text-xs font-mono text-white min-w-[32px]">{thresholds[node.id]}ms</span>
                            </div>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                </section>
              </div>
            </div>
          );
        }

        // --- Main Component ---

        function RevOpsDashboard() {
          const [view, setView] = useState('dashboard');
          const [hoveredNodeId, setHoveredNodeId] = useState(null);
          const [alerts, setAlerts] = useState([]);
          const [thresholds, setThresholds] = useState({
            salesforce: 150,
            hubspot: 100,
            stripe: 150,
            ml: 300,
            eventbus: 50,
            webhooks: 50,
          });

          const [stats, setStats] = useState({
            ingest: 18.4,
            clean: 99.8,
            route: 142,
            signals: 1240,
            inflow: 4.2,
            outflow: 2.8,
          });

          const [nodes, setNodes] = useState([
            { id: 'salesforce', name: 'Salesforce', subtext: '2m ago', status: 'ACTIVE', latency: 12, records: '842k', icon: Database, colorClass: 'text-sky-400', bgClass: 'bg-sky-500/10', statusColorClass: 'text-sky-400', statusBgClass: 'bg-sky-400/10' },
            { id: 'hubspot', name: 'HubSpot', subtext: 'Real-time', status: 'SYNCING', latency: 4, records: '1.2M', icon: Megaphone, colorClass: 'text-emerald-400', bgClass: 'bg-emerald-500/10', statusColorClass: 'text-emerald-400', statusBgClass: 'bg-emerald-400/10' },
            { id: 'stripe', name: 'Stripe', subtext: 'Pending: 12', status: 'ACTIVE', latency: 32, records: '$4.2M', icon: CreditCard, colorClass: 'text-fuchsia-400', bgClass: 'bg-fuchsia-500/10', statusColorClass: 'text-fuchsia-400', statusBgClass: 'bg-fuchsia-400/10' },
            { id: 'ml', name: 'ML Insights', subtext: 'Growth', status: 'PROCESS', latency: 128, records: '428', icon: BrainCircuit, colorClass: 'text-primary', bgClass: 'bg-primary/20', statusColorClass: 'text-primary', statusBgClass: 'bg-primary/20' },
            { id: 'eventbus', name: 'Event Bus', subtext: 'Internal', status: 'STABLE', latency: 1, records: '4.2k/s', icon: Network, colorClass: 'text-slate-400', bgClass: 'bg-slate-500/10', statusColorClass: 'text-emerald-400', statusBgClass: 'bg-emerald-400/10' },
            { id: 'webhooks', name: 'Webhooks', subtext: 'External', status: 'STABLE', latency: 2, records: '928/m', icon: Terminal, colorClass: 'text-slate-400', bgClass: 'bg-slate-500/10', statusColorClass: 'text-emerald-400', statusBgClass: 'bg-emerald-400/10' },
          ]);

          useEffect(() => {
            const interval = setInterval(() => {
              const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
              
              setStats(prev => ({
                ...prev,
                inflow: Math.max(0, +(prev.inflow + (Math.random() * 0.4 - 0.2)).toFixed(1)),
                outflow: Math.max(0, +(prev.outflow + (Math.random() * 0.4 - 0.2)).toFixed(1)),
                signals: Math.max(0, Math.floor(prev.signals + (Math.random() * 10 - 3))),
                ingest: Math.max(0, +(prev.ingest + (Math.random() * 0.05 - 0.01)).toFixed(1)),
              }));

              setNodes(prevNodes => {
                return prevNodes.map(node => {
                  if (Math.random() > 0.6) {
                    const newLatency = Math.max(1, Math.floor(node.latency + (Math.random() * 100 - 45)));
                    const threshold = thresholds[node.id];
                    if (newLatency > threshold) {
                      setAlerts(prev => {
                        if (prev.some(a => a.nodeId === node.id && !a.resolved)) return prev;
                        return [{
                          id: Math.random().toString(36).substr(2, 9),
                          nodeId: node.id,
                          nodeName: node.name,
                          latency: newLatency,
                          threshold: threshold,
                          timestamp: now,
                          resolved: false
                        }, ...prev].slice(0, 20);
                      });
                    }
                    return { ...node, latency: newLatency };
                  }
                  return node;
                });
              });
            }, 2000);

            return () => clearInterval(interval);
          }, [thresholds]);

          const handleResolve = (id) => {
            setAlerts(prev => prev.map(a => a.id === id ? { ...a, resolved: true } : a));
          };

          const handleThresholdChange = (id, val) => {
            setThresholds(prev => ({ ...prev, [id]: val }));
          };

          return (
            <div className="w-full aspect-square max-w-[600px] bg-[#0f111a] text-slate-100 font-display overflow-hidden relative flex shadow-2xl rounded-xl border border-white/10 selection:bg-primary/30">
                <Sidebar 
                  activeView={view} 
                  setView={setView} 
                  alertCount={alerts.filter(a => !a.resolved).length} 
                />
                <main className="flex-1 flex flex-col relative overflow-hidden bg-[#0f111a]">
                  {view === 'dashboard' ? (
                    <DashboardHome 
                      stats={stats} 
                      nodes={nodes} 
                      hoveredNodeId={hoveredNodeId} 
                      setHoveredNodeId={setHoveredNodeId} 
                    />
                  ) : view === 'logs' ? (
                    <LogsView />
                  ) : (
                    <AlertsView 
                      alerts={alerts} 
                      nodes={nodes} 
                      thresholds={thresholds} 
                      onThresholdChange={handleThresholdChange}
                      onResolve={handleResolve}
                    />
                  )}
                </main>
            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<RevOpsDashboard />);
    </script>
</body>
</html>
