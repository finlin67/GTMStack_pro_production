<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EnergyFlowDigital</title>
  <!-- Gallery thumbnail placeholder (Option B). Safe to replace with a real HTML preview later. -->
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(1200px 600px at 20% 0%, #1e3a5f 0%, transparent 55%),
                  radial-gradient(900px 500px at 100% 30%, #312e81 0%, transparent 50%),
                  #0f172a;
      color: #e2e8f0;
    }
    .card {
      width: min(920px, calc(100vw - 48px));
      padding: 40px 44px;
      border-radius: 16px;
      background: rgba(30, 41, 59, 0.92);
      border: 1px solid rgba(148, 163, 184, 0.2);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
    }
    .badge {
      display: inline-block;
      font-size: 12px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #94a3b8;
      margin-bottom: 14px;
    }
    h1 {
      margin: 0 0 16px;
      font-size: clamp(26px, 4vw, 36px);
      font-weight: 700;
      line-height: 1.15;
      color: #f8fafc;
    }
    p {
      margin: 0;
      font-size: 17px;
      line-height: 1.55;
      color: #cbd5e1;
    }
    .meta {
      margin-top: 22px;
      font-size: 12px;
      color: #64748b;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">industries</div>
    <h1>EnergyFlowDigital</h1>
    <p>A high-fidelity industrial dashboard component visualizing engineering lifecycle and commercialization metrics for heavy industry.</p>
    <div class="meta">energyflow-minimal-dashboard-v2</div>
  </div>
</body>
</html>
