<!-- ABM-Radar-Analysis.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ABM-Radar-Analysis.html</title>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.2.0",
    "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
    "framer-motion": "https://esm.sh/framer-motion?external=react",
    "lucide-react": "https://esm.sh/lucide-react?external=react"
  }
}
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-type="module">
import React, { useState, useEffect, useMemo, useCallback, useRef } from 'react';
import * as ReactDOMClient from 'react-dom/client';

import React, { useState, useEffect, useMemo, useCallback, useRef } from 'react';
import { motion, AnimatePresence } from 'framer-motion';
import { 
  Target, 
  TrendingUp, 
  Zap, 
  Search, 
  Filter, 
  Globe, 
  Signal, 
  ArrowUpRight, 
  Cpu, 
  MousePointer2, 
  Sparkles, 
  Hexagon,
  Zap
  LayoutGrid,
  Radar,
  Activity,
  BarChart3
} from 'lucide-react';

/**
 * ==========================================
 * TYPES & INTERFACES
 * ==========================================
 */
/**
 * ==========================================
 * MOCK DATA
 * ==========================================
 */

const ACCOUNTS = [
  { id: '1', name: 'Nvidia Corp', domain: 'nvidia.com', tier: 1, intent: 94, pipeline: '$4.2M', angle: 45, distance: 30, status: 'Growing' },
  { id: '2', name: 'Stripe', domain: 'stripe.com', tier: 1, intent: 88, pipeline: '$2.1M', angle: 160, distance: 45, status: 'Growing' },
  { id: '3', name: 'Linear', domain: 'linear.app', tier: 2, intent: 76, pipeline: '$850k', angle: 280, distance: 65, status: 'Stable' },
  { id: '4', name: 'Snowflake', domain: 'snowflake.com', tier: 1, intent: 65, pipeline: '$1.5M', angle: 10, distance: 80, status: 'Critical' },
  { id: '5', name: 'Datadog', domain: 'datadog.com', tier: 2, intent: 58, pipeline: '$420k', angle: 210, distance: 90, status: 'Stable' },
  { id: '6', name: 'Vercel', domain: 'vercel.com', tier: 1, intent: 82, pipeline: '$1.2M', angle: 330, distance: 40, status: 'Growing' },
];

const RECENT_TOUCHPOINTS = [
  { id: 't1', accountName: 'Nvidia', type: 'Web', timestamp: '2m ago', score: 12 },
  { id: 't2', accountName: 'Stripe', type: 'Email', timestamp: '15m ago', score: 8 },
  { id: 't3', accountName: 'Linear', type: 'Ads', timestamp: '1h ago', score: 5 },
];

/**
 * ==========================================
 * UI COMPONENTS (STRICT CONSTRAINTS)
 * ==========================================
 */

// Fix for lines 103 and 159: Made children optional to resolve TypeScript property missing errors
const GlassSurface = ({ children, className = "", elevation = "mid" }) => {
  const intensities = {
    low: "bg-white/[0.02] border-white/5",
    mid: "bg-white/[0.04] border-white/10 shadow-xl",
    high: "bg-white/[0.08] border-white/20 shadow-2xl backdrop-blur-xl",
  };
  return (
    <div className={`rounded-2xl border transition-all duration-300 ${intensities[elevation]} ${className}`}>
      {children}
    </div>
  );
};

const KPIBadge = ({ icon: Icon, value, label, trend, accent = "blue" }) => {
  const accents = {
    blue: "text-sky-400 bg-sky-500/10 border-sky-500/20",
    orange: "text-orange-400 bg-orange-500/10 border-orange-500/20",
    gold: "text-amber-400 bg-amber-500/10 border-orange-500/20",
  };

  return (
    <GlassSurface elevation="mid" className="p-3.5 flex flex-col gap-1 hover:bg-white/[0.06] group cursor-default">
      <div className="flex items-center justify-between mb-0.5">
        <div className={`p-1.5 rounded-lg border ${accents[accent]}`}>
          <Icon className="w-3 h-3" />
        </div>
        {trend && (
          <div className="flex items-center gap-1 text-[9px] font-bold text-emerald-400 bg-emerald-500/5 px-1.5 py-0.5 rounded-full border border-emerald-500/10">
            {trend} <TrendingUp className="w-2 h-2" />
          </div>
        )}
      </div>
      <div>
        <span className="text-lg font-bold text-slate-100 tracking-tight leading-none">{value}</span>
        <p className="text-[8px] font-bold uppercase tracking-[0.2em] text-slate-500 mt-1">{label}</p>
      </div>
    </GlassSurface>
  );
};

const RadarNode = ({ account, onSelect }) => {
  const [jitter, setJitter] = useState({ x: 0, y: 0 });

  // Jitter logic using recursive setTimeout for organic feel
  useEffect(() => {
    let timeoutId;
    const updateJitter = () => {
      setJitter({
        x: (Math.random() - 0.5) * 1.8,
        y: (Math.random() - 0.5) * 1.8,
      });
      timeoutId = setTimeout(updateJitter, 2000 + Math.random() * 3000);
    };
    updateJitter();
    return () => clearTimeout(timeoutId);
  }, []);

  const x = Math.cos((account.angle * Math.PI) / 180) * account.distance + jitter.x;
  const y = Math.sin((account.angle * Math.PI) / 180) * account.distance + jitter.y;

  return (
    <motion.div
      initial={{ scale: 0, opacity: 0 }}
      animate={{ scale: 1, opacity: 1 }}
      whileHover={{ scale: 1.1, zIndex: 50 }}
      onClick={() => onSelect(account)}
      className="absolute cursor-pointer group"
      style={{ left: `calc(50% + ${x}%)`, top: `calc(50% + ${y}%)` }}
    >
      <div className="relative">
        <div className={`w-3 h-3 rounded-full relative z-10 border-2 border-[#0f172a] ${account.tier === 1 ? 'bg-sky-500 shadow-[0_0_12px_rgba(14,165,233,0.6)]' : 'bg-slate-500'}`} />
        <motion.div 
          animate={{ scale: [1, 1.8, 1], opacity: [0.3, 0, 0.3] }}
          transition={{ repeat: Infinity, duration: 4, delay.random() * 4 }}
          className={`absolute -inset-1.5 rounded-full blur-md ${account.tier === 1 ? 'bg-sky-400' : 'bg-slate-400'}`}
        />
        
        <div className="absolute bottom-full mb-2 left-1/2 -translate-x-1/2 opacity-0 group-hover:opacity-100 transition-all scale-95 group-hover:scale-100 pointer-events-none z-50">
          <GlassSurface elevation="high" className="px-2 py-1.5 border-sky-500/30 min-w-[100px]">
            <div className="flex flex-col">
              <span className="text-[9px] font-bold text-white leading-none mb-0.5 whitespace-nowrap">{account.name}</span>
              <div className="flex items-center justify-between">
                <span className="text-[7px] font-bold text-slate-500 uppercase tracking-widest">Score</span>
                <span className="text-[8px] font-mono font-bold text-sky-400">{account.intent}%</span>
              </div>
            </div>
          </GlassSurface>
        </div>
      </div>
    </motion.div>
  );
};

/**
 * ==========================================
 * MAIN DASHBOARD
 * ==========================================
 */

function ABMRadarAnalysis() {
  const [activeTab, setActiveTab] = useState('radar');
  const [selectedAccount, setSelectedAccount] = useState(null);
  const [time, setTime] = useState("");
  const [stats, setStats] = useState({
    totalAccounts: 124,
    hotLeads: 28,
    pipelineValue: "$18.4M",
    activeSessions: 42
  });

  // Time & Stats organic updates via recursive setTimeout for jitter/organic effect
  useEffect(() => {
    let timeTimeout;
    let statsTimeout;

    const updateTime = () => {
      const now = new Date();
      setTime(now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' }));
      timeTimeout = setTimeout(updateTime, 1000);
    };
    updateTime();

    const updateStats = () => {
      setStats(prev => ({
        ...prev,
        activeSessions.floor(40 + Math.random() * 10),
        hotLeads.floor(25 + Math.random() * 8)
      }));
      statsTimeout = setTimeout(updateStats, 3000 + Math.random() * 5000);
    };
    updateStats();

    return () => {
      clearTimeout(timeTimeout);
      clearTimeout(statsTimeout);
    };
  }, []);

  return (
    <div className="w-full h-full min-h-screen bg-[#020617] text-slate-300 font-sans selection:bg-sky-500/30 overflow-hidden flex flex-col">
      {/* Top Header */}
      <header className="px-6 py-4 border-b border-white/5 flex items-center justify-between backdrop-blur-md sticky top-0 z-40 bg-[#020617]/80">
        <div className="flex items-center gap-3">
          <div className="w-8 h-8 rounded-lg bg-sky-500 flex items-center justify-center shadow-[0_0_15px_rgba(14,165,233,0.4)]">
            <Target className="w-5 h-5 text-white" />
          </div>
          <div>
            <h1 className="text-sm font-bold text-white tracking-tight">ABM RADAR</h1>
            <p className="text-[10px] text-slate-500 font-medium tracking-widest uppercase">Autonomous Intelligence Engine</p>
          </div>
        </div>

        <div className="flex items-center gap-6">
          <div className="flex items-center gap-4 text-[10px] font-mono font-bold tracking-tighter">
            <div className="flex items-center gap-1.5 px-2 py-1 rounded bg-white/[0.03] border border-white/5">
              <span className="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse" />
              <span className="text-emerald-500">SYSTEM LIVE</span>
            </div>
            <span className="text-slate-400">{time}</span>
          </div>
          <div className="h-4 w-px bg-white/10" />
          <button className="p-2 rounded-full hover:bg-white/5 transition-colors">
            <Search className="w-4 h-4 text-slate-400" />
          </button>
        </div>
      </header>

      <main className="flex-1 flex overflow-hidden">
        {/* Sidebar Nav */}
        <aside className="w-16 border-r border-white/5 flex flex-col items-center py-6 gap-8 bg-[#020617]">
          <nav className="flex flex-col gap-6">
            <button 
              onClick={() => setActiveTab('radar')}
              className={`p-2.5 rounded-xl transition-all ${activeTab === 'radar' ? 'bg-sky-500/10 text-sky-400 shadow-[inset_0_0_10px_rgba(14,165,233,0.1)] border border-sky-500/20' : 'text-slate-600 hover:text-slate-400'}`}
            >
              <Radar className="w-5 h-5" />
            </button>
            <button 
              onClick={() => setActiveTab('list')}
              className={`p-2.5 rounded-xl transition-all ${activeTab === 'list' ? 'bg-sky-500/10 text-sky-400 shadow-[inset_0_0_10px_rgba(14,165,233,0.1)] border border-sky-500/20' : 'text-slate-600 hover:text-slate-400'}`}
            >
              <LayoutGrid className="w-5 h-5" />
            </button>
            <button className="p-2.5 rounded-xl text-slate-600 hover:text-slate-400 transition-all">
              <Activity className="w-5 h-5" />
            </button>
          </nav>
        </aside>

        {/* Dashboard Content */}
        <div className="flex-1 flex flex-col p-6 gap-6 overflow-hidden">
          {/* Top Stats Row */}
          <div className="grid grid-cols-4 gap-4 shrink-0">
            <KPIBadge icon={Globe} value={stats.totalAccounts} label="Total Accounts" trend="+12%" />
            <KPIBadge icon={Sparkles} value={stats.hotLeads} label="High Intent" trend="+4%" accent="orange" />
            <KPIBadge icon={BarChart3} value={stats.pipelineValue} label="Pipeline" trend="+22%" accent="gold" />
            <KPIBadge icon={Signal} value={stats.activeSessions} label="Active Signal" trend="+18%" />
          </div>

          {/* Main Visualizer Area */}
          <div className="flex-1 min-h-0 flex gap-6">
            <div className="flex-1 relative">
              <AnimatePresence mode="wait">
                {activeTab === 'radar' ? (
                  <motion.div 
                    key="radar"
                    initial={{ opacity: 0, scale: 0.95 }}
                    animate={{ opacity: 1, scale: 1 }}
                    exit={{ opacity: 0, scale: 0.95 }}
                    className="w-full h-full relative"
                  >
                    <GlassSurface elevation="mid" className="w-full h-full flex items-center justify-center overflow-hidden border-sky-500/10">
                      {/* Radar Background Rings */}
                      <div className="absolute inset-0 flex items-center justify-center pointer-events-none opacity-20">
                        {[1, 2, 3, 4].map((ring) => (
                          <div 
                            key={ring} 
                            className="absolute rounded-full border border-sky-500/20"
                            style={{ 
                              width: `${ring * 25}%`, 
                              height: `${ring * 25}%`,
                              aspectRatio: '1/1'
                            }} 
                          />
                        ))}
                        <div className="absolute w-px h-full bg-sky-500/10" />
                        <div className="absolute w-full h-px bg-sky-500/10" />
                      </div>

                      {/* Radar Sweeper */}
                      <motion.div 
                        animate={{ rotate: 360 }}
                        transition={{ duration: 10, repeat: "linear" }}
                        className="absolute w-1/2 h-1/2 origin-bottom-right top-0 left-0 bg-gradient-to-tr from-sky-500/10 via-transparent to-transparent border-r border-sky-500/10 pointer-events-none"
                      />

                      {/* Nodes */}
                      {ACCOUNTS.map(account => (
                        <RadarNode key={account.id} account={account} onSelect={setSelectedAccount} />
                      ))}
                    </GlassSurface>
                  </motion.div>
                ) : (
                  <motion.div 
                    key="list"
                    initial={{ opacity: 0, y: 10 }}
                    animate={{ opacity: 1, y: 0 }}
                    exit={{ opacity: 0, y: 10 }}
                    className="w-full h-full"
                  >
                    <GlassSurface elevation="mid" className="w-full h-full overflow-hidden flex flex-col border-white/5">
                      <div className="px-6 py-4 border-b border-white/5 bg-white/[0.02] flex items-center justify-between">
                        <span className="text-[10px] font-bold uppercase tracking-widest text-slate-500">Account Inventory</span>
                        <Filter className="w-4 h-4 text-slate-500" />
                      </div>
                      <div className="flex-1 overflow-y-auto p-4 flex flex-col gap-2 custom-scrollbar">
                        {ACCOUNTS.map(acc => (
                          <div 
                            key={acc.id}
                            onClick={() => setSelectedAccount(acc)}
                            className="p-3 rounded-xl border border-white/5 hover:border-sky-500/30 hover:bg-white/[0.02] transition-all flex items-center justify-between cursor-pointer group"
                          >
                            <div className="flex items-center gap-3">
                              <div className={`w-2 h-2 rounded-full ${acc.status === 'Growing' ? 'bg-emerald-500' : acc.status === 'Stable' ? 'bg-amber-500' : 'bg-rose-500'}`} />
                              <div>
                                <h3 className="text-xs font-bold text-slate-200 group-hover:text-sky-400 transition-colors">{acc.name}</h3>
                                <p className="text-[9px] text-slate-500 font-mono tracking-tighter">{acc.domain}</p>
                              </div>
                            </div>
                            <div className="flex items-center gap-6">
                              <div className="text-right">
                                <p className="text-[10px] font-bold text-slate-200">{acc.pipeline}</p>
                                <p className="text-[8px] text-slate-500 font-bold uppercase">Pipeline</p>
                              </div>
                              <div className="w-12 h-1 bg-white/5 rounded-full overflow-hidden">
                                <motion.div 
                                  initial={{ width: 0 }}
                                  animate={{ width: `${acc.intent}%` }}
                                  className="h-full bg-sky-500"
                                />
                              </div>
                            </div>
                          </div>
                        ))}
                      </div>
                    </GlassSurface>
                  </motion.div>
                )}
              </AnimatePresence>
            </div>

            {/* Sidebar Feed */}
            <div className="w-80 shrink-0 flex flex-col gap-6">
              <GlassSurface elevation="mid" className="flex-1 flex flex-col overflow-hidden border-white/5">
                <div className="px-5 py-4 border-b border-white/5 flex items-center justify-between">
                  <div className="flex items-center gap-2">
                    <Zap className="w-4 h-4 text-amber-400" />
                    <span className="text-[10px] font-bold uppercase tracking-widest text-slate-200">Live Signals</span>
                  </div>
                </div>
                <div className="flex-1 overflow-y-auto p-4 flex flex-col gap-4">
                  {RECENT_TOUCHPOINTS.map(tp => (
                    <div key={tp.id} className="relative pl-5 before:absolute before:left-0 before:top-1.5 before:bottom-0 before:w-px before:bg-white/10 last:before:hidden">
                      <div className="absolute left-[-2px] top-1.5 w-1.5 h-1.5 rounded-full bg-sky-500 ring-4 ring-[#020617]" />
                      <div className="flex flex-col gap-1">
                        <div className="flex items-center justify-between">
                          <span className="text-[11px] font-bold text-white">{tp.accountName}</span>
                          <span className="text-[8px] text-slate-500 font-mono">{tp.timestamp}</span>
                        </div>
                        <p className="text-[9px] text-slate-400">
                          {tp.type} activity detected. Intent score <span className="text-sky-400 font-bold">+{tp.score}</span>
                        </p>
                      </div>
                    </div>
                  ))}
                </div>
                <div className="p-4 bg-white/[0.01] border-t border-white/5">
                  <button className="w-full py-2.5 rounded-xl bg-sky-500 hover:bg-sky-400 text-white text-[10px] font-bold uppercase tracking-widest transition-all shadow-[0_0_20px_rgba(14,165,233,0.2)]">
                    View Full Feed
                  </button>
                </div>
              </GlassSurface>
            </div>
          

const root = ReactDOMClient.createRoot(document.getElementById('root'));
root.render(<ABMRadarAnalysis />);
  </script>
</body>
</html>
