<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revenue Systems Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react?deps=react@18.2.0",
        "framer-motion": "https://esm.sh/framer-motion?deps=react@18.2.0"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #020617;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        overflow: hidden;
      }
      /* Custom scrollbar for inner content if needed */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 10px;
      }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
          motion, 
          AnimatePresence 
        } from 'framer-motion';
        import { 
          BarChart3, 
          Users, 
          Activity, 
          ArrowUpRight, 
          ShieldCheck, 
          Cpu 
        } from 'lucide-react';

        export default function RevenueSystems() {
          const [stats, setStats] = useState([
            { 
              id: 'rev', 
              label: 'Revenue', 
              value: 45231, 
              trend: 12.5, 
              icon: BarChart3, 
              color: 'text-purple-400',
              strokeColor: '#c084fc',
              history: [40, 35, 55, 45, 70, 65, 85, 80, 95]
            },
            { 
              id: 'usr', 
              label: 'Active Users', 
              value: 1240, 
              trend: 8.2, 
              icon: Users, 
              color: 'text-blue-400',
              strokeColor: '#60a5fa',
              history: [30, 40, 35, 50, 45, 60, 55, 75, 70]
            },
            { 
              id: 'sys', 
              label: 'System Load', 
              value: 42, 
              trend: -2.4, 
              icon: Activity, 
              color: 'text-emerald-400',
              strokeColor: '#34d399',
              history: [60, 55, 65, 50, 55, 45, 50, 40, 42]
            },
            { 
              id: 'sec', 
              label: 'Security Score', 
              value: 99.8, 
              trend: 0.1, 
              icon: ShieldCheck, 
              color: 'text-amber-400',
              strokeColor: '#fbbf24',
              history: [95, 96, 95, 97, 98, 97, 99, 98, 99]
            }
          ]);

          const [activePulse, setActivePulse] = useState(0);

          useEffect(() => {
            const updateData = () => {
              setStats(prev => prev.map(stat => {
                const jitter = (Math.random() - 0.5) * (stat.id === 'sys' ? 5 : 20);
                const newValue = Math.max(0, stat.value + jitter);
                
                // Update history by shifting and adding new relative point (0-100 scale)
                const normalizedValue = stat.id === 'rev' ? (newValue / 500) : 
                                       stat.id === 'usr' ? (newValue / 20) :
                                       newValue;
                const cappedValue = Math.min(100, Math.max(0, normalizedValue));
                const newHistory = [...stat.history.slice(1), cappedValue];

                return {
                  ...stat,
                  value: newValue,
                  history: newHistory
                };
              }));
              setActivePulse(p => (p + 1) % 4);
              
              const nextDelay = 1500 + Math.random() * 1000;
              timeoutId = setTimeout(updateData, nextDelay);
            };

            let timeoutId = setTimeout(updateData, 2000);
            return () => clearTimeout(timeoutId);
          }, []);

          const getPathData = (history) => {
            const width = 100;
            const height = 40;
            const padding = 5;
            const points = history.map((val, i) => {
              const x = (i / (history.length - 1)) * width;
              const y = height - ((val / 100) * (height - padding * 2) + padding);
              return `${x},${y}`;
            });
            return `M ${points.join(' L ')}`;
          };

          return (
            <div className="w-full aspect-square max-w-[600px] flex items-center justify-center bg-slate-950 overflow-hidden font-sans p-6 rounded-3xl relative border border-slate-800 shadow-2xl">
              {/* Dynamic Background Gradients */}
              <div className="absolute inset-0 overflow-hidden pointer-events-none">
                <motion.div 
                  animate={{ 
                    scale: [1, 1.2, 1],
                    opacity: [0.03, 0.07, 0.03]
                  }}
                  transition={{ duration: 10, repeat: Infinity }}
                  className="absolute top-0 left-0 w-full h-full bg-[radial-gradient(circle_at_20%_20%,#c084fc,transparent_50%)]" 
                />
                <motion.div 
                  animate={{ 
                    scale: [1.2, 1, 1.2],
                    opacity: [0.03, 0.06, 0.03]
                  }}
                  transition={{ duration: 12, repeat: Infinity }}
                  className="absolute bottom-0 right-0 w-full h-full bg-[radial-gradient(circle_at_80%_80%,#3b82f6,transparent_50%)]" 
                />
              </div>

              {/* Bento Grid */}
              <div className="relative w-full h-full grid grid-cols-2 grid-rows-2 gap-4 z-10">
                <AnimatePresence mode="popLayout">
                  {stats.map((stat, idx) => (
                    <motion.div
                      key={stat.id}
                      initial={{ opacity: [0, 1], scale: [0.9, 1] }}
                      animate={{ 
                        opacity: [1], 
                        scale: [activePulse === idx ? 1.01 : 1],
                        borderColor: activePulse === idx ? ['rgba(30,41,59,1)', 'rgba(192,132,252,0.4)', 'rgba(30,41,59,1)'] : 'rgba(30,41,59,1)'
                      }}
                      className="bg-slate-900/40 backdrop-blur-xl border border-slate-800 rounded-3xl p-5 flex flex-col justify-between group relative overflow-hidden"
                    >
                      <div className="absolute inset-0 bg-gradient-to-br from-white/[0.03] to-transparent pointer-events-none" />
                      
                      <div className="flex justify-between items-start">
                        <div className={`p-2.5 rounded-xl bg-slate-800/80 border border-slate-700/50 ${stat.color} shadow-lg`}>
                          <stat.icon size={20} />
                        </div>
                        <div className={`flex items-center gap-1 text-[10px] font-bold ${stat.trend >= 0 ? 'text-emerald-400 bg-emerald-500/10' : 'text-rose-400 bg-rose-500/10'} px-2 py-1 rounded-full border border-current opacity-80`}>
                          <ArrowUpRight size={10} className={stat.trend < 0 ? 'rotate-90' : ''} />
                          {Math.abs(stat.trend)}%
                        </div>
                      </div>

                      <div className="space-y-1 mt-4">
                        <p className="text-slate-500 text-[10px] font-bold uppercase tracking-widest">{stat.label}</p>
                        <div className="flex items-baseline gap-2">
                          <motion.span 
                            key={stat.value}
                            initial={{ opacity: [0, 1], y: [4, 0] }}
                            animate={{ opacity: 1, y: 0 }}
                            className="text-2xl font-bold text-white tabular-nums tracking-tight"
                          >
                            {stat.id === 'rev' ? `$${Math.floor(stat.value).toLocaleString()}` : 
                             stat.id === 'sec' ? stat.value.toFixed(1) :
                             Math.floor(stat.value).toLocaleString()}
                            {stat.id === 'sys' || stat.id === 'sec' ? '%' : ''}
                          </motion.span>
                        </div>
                      </div>

                      {/* Sparkline */}
                      <div className="h-10 w-full mt-3 opacity-40 group-hover:opacity-100 transition-opacity duration-500">
                        <svg viewBox="0 0 100 40" className="w-full h-full overflow-visible">
                          <defs>
                            <linearGradient id={`grad-${stat.id}`} x1="0%" y1="0%" x2="0%" y2="100%">
                              <stop offset="0%" stopColor={stat.strokeColor} stopOpacity="0.3" />
                              <stop offset="100%" stopColor={stat.strokeColor} stopOpacity="0" />
                            </linearGradient>
                          </defs>
                          
                          <motion.path
                            d={`${getPathData(stat.history)} L 100,40 L 0,40 Z`}
                            fill={`url(#grad-${stat.id})`}
                            initial={{ opacity: 0 }}
                            animate={{ opacity: 1 }}
                          />

                          <motion.path
                            d={getPathData(stat.history)}
                            fill="none"
                            stroke={stat.strokeColor}
                            strokeWidth="2"
                            strokeLinecap="round"
                            strokeLinejoin="round"
                            initial={{ pathLength: 0 }}
                            animate={{ pathLength: 1 }}
                            transition={{ duration: 1 }}
                          />
                        </svg>
                      </div>
                    </motion.div>
                  ))}
                </AnimatePresence>
              </div>

              {/* Central HUD Element */}
              <div className="absolute inset-0 flex items-center justify-center pointer-events-none z-20">
                <div className="relative w-40 h-40 flex items-center justify-center">
                  <motion.div 
                    animate={{ rotate: [0, 360] }}
                    transition={{ duration: 25, repeat: Infinity, ease: "linear" }}
                    className="absolute inset-0 border border-slate-700/40 rounded-full"
                  />
                  <motion.div 
                    animate={{ rotate: [360, 0] }}
                    transition={{ duration: 15, repeat: Infinity, ease: "linear" }}
                    className="absolute inset-4 border border-dashed border-slate-800 rounded-full"
                  />
                  <motion.div 
                    animate={{ scale: [1, 1.05, 1], opacity: [0.3, 0.6, 0.3] }}
                    transition={{ duration: 4, repeat: Infinity }}
                    className="absolute inset-10 bg-purple-500/10 rounded-full blur-3xl"
                  />
                  
                  <div className="relative bg-slate-900 border border-slate-700 p-4 rounded-2xl shadow-2xl flex items-center justify-center text-purple-400 backdrop-blur-md">
                    <motion.div
                      animate={{ 
                        scale: [1, 1.15, 1],
                        filter: ['brightness(1)', 'brightness(1.4)', 'brightness(1)']
                      }}
                      transition={{ duration: 2.5, repeat: Infinity }}
                    >
                      <Cpu size={24} />
                    </motion.div>
                  </div>
                </div>
              </div>

              {/* Status Bar */}
              <div className="absolute bottom-4 left-0 right-0 flex justify-center px-10 pointer-events-none z-30">
                <div className="bg-slate-900/80 backdrop-blur-md border border-slate-800 px-4 py-1.5 rounded-full flex items-center gap-4 shadow-xl">
                  <div className="flex items-center gap-1.5">
                    <div className="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse" />
                    <span className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Live Engine</span>
                  </div>
                  <div className="h-3 w-px bg-slate-800" />
                  <span className="text-[9px] font-mono text-slate-500 tracking-tighter">LATENCY: 14MS</span>
                  <div className="h-3 w-px bg-slate-800" />
                  <span className="text-[9px] font-mono text-slate-500 tracking-tighter">UPTIME: 99.98%</span>
                </div>
              </div>
            </div>
          );
        }

        const container = document.getElementById('root');
        const root = createRoot(container);
        root.render(<RevenueSystems />);
    </script>
</body>
</html>
